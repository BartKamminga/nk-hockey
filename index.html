<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

// ════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════
const NK14_SLOTS={A:['A','B'],B:['B','A'],C:['A','B'],D:['B','A'],E:['A','B']};
const POULE_ORDER_14=['A','B','C','D','E'];
const POULE_ORDER_16=['A','B','C','D'];
const POS_COLORS=['#22c55e','#3b82f6','#f59e0b','#f87171','#c084fc','#94a3b8'];

// ════════════════════════════════════════════
// SIMULATION CORE
// ════════════════════════════════════════════
const simMatch=(ha)=>{const a=(ha||0)/100,rW=.38+a,rD=.23,rL=Math.max(.39-a,.05),t=rW+rD+rL,pW=rW/t,pD=rD/t,r=Math.random();return r<pW?[3,0]:r<pW+pD?[1,1]:[0,3]};
const simGD=()=>1+Math.floor(Math.random()*4);
const simKO=()=>Math.random()<.5?'home':'away';

function simPoule(poule,ha){
  const pts=[...poule.pts],ds=[...poule.ds];
  for(const[h,a]of poule.remaining){const hi=poule.teams.indexOf(h),ai=poule.teams.indexOf(a);if(hi<0||ai<0)continue;const[hp,ap]=simMatch(ha);pts[hi]+=hp;pts[ai]+=ap;const gd=simGD();if(hp>ap){ds[hi]+=gd;ds[ai]-=gd}else if(ap>hp){ds[ai]+=gd;ds[hi]-=gd}}
  return pts.map((_,i)=>i).sort((a,b)=>pts[b]!==pts[a]?pts[b]-pts[a]:ds[b]-ds[a]);
}

function simNKPoule(names){
  const n=names.length,pts=Array(n).fill(0),ds=Array(n).fill(0);
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){const[hp,ap]=simMatch(0);pts[i]+=hp;pts[j]+=ap;const gd=simGD();if(hp>ap){ds[i]+=gd;ds[j]-=gd}else if(ap>hp){ds[j]+=gd;ds[i]-=gd}}
  return pts.map((_,i)=>i).sort((a,b)=>pts[b]!==pts[a]?pts[b]-pts[a]:ds[b]-ds[a]);
}

// ════════════════════════════════════════════
// O14 SIMULATION
// ════════════════════════════════════════════
function runSimO14(data,N,ha){
  const ss={};for(const id of Object.keys(data))ss[id]=data[id].teams.map(()=>Array(6).fill(0));
  const nkAp={},nkBp={},nkAa={},nkBa={},fin={};
  const ensF=t=>{if(!fin[t])fin[t]={appear:0,sfReach:0,finalist:0,p1:0,p2:0,p3:0,p4:0}};
  const pk=POULE_ORDER_14.filter(k=>data[k]);
  for(let s=0;s<N;s++){
    const st={};
    for(const id of pk){const o=simPoule(data[id],ha);st[id]=o.map(i=>data[id].teams[i]);for(let r=0;r<data[id].teams.length;r++)ss[id][o[r]][r]++}
    const nkA=pk.filter(k=>NK14_SLOTS[k][0]==='A').map(k=>st[k][0]).concat(pk.filter(k=>NK14_SLOTS[k][1]==='A').map(k=>st[k][1]));
    const nkB=pk.filter(k=>NK14_SLOTS[k][0]==='B').map(k=>st[k][0]).concat(pk.filter(k=>NK14_SLOTS[k][1]==='B').map(k=>st[k][1]));
    for(const t of nkA){nkAa[t]=(nkAa[t]||0)+1;if(!nkAp[t])nkAp[t]=Array(5).fill(0);ensF(t);fin[t].appear++}
    for(const t of nkB){nkBa[t]=(nkBa[t]||0)+1;if(!nkBp[t])nkBp[t]=Array(5).fill(0);ensF(t);fin[t].appear++}
    const oA=simNKPoule(nkA),oB=simNKPoule(nkB);
    for(let r=0;r<nkA.length;r++)nkAp[nkA[oA[r]]][r]++;
    for(let r=0;r<nkB.length;r++)nkBp[nkB[oB[r]]][r]++;
    const[a1,a2,b1,b2]=[nkA[oA[0]],nkA[oA[1]],nkB[oB[0]],nkB[oB[1]]];
    for(const t of[a1,a2,b1,b2])fin[t].sfReach++;
    const w1=simKO()==='home'?a1:b2,l1=w1===a1?b2:a1;
    const w2=simKO()==='home'?b1:a2,l2=w2===b1?a2:b1;
    fin[w1].finalist++;fin[w2].finalist++;
    const fW=Math.random()<.5?w1:w2,fL=fW===w1?w2:w1;
    const tW=Math.random()<.5?l1:l2,tL=tW===l1?l2:l1;
    fin[fW].p1++;fin[fL].p2++;fin[tW].p3++;fin[tL].p4++
  }
  return{ss,nkAp,nkBp,nkAa,nkBa,fin}
}

// ════════════════════════════════════════════
// O16 SIMULATION
// ════════════════════════════════════════════
function runSimO16(data,N,ha){
  const ss={};for(const id of Object.keys(data))ss[id]=data[id].teams.map(()=>Array(6).fill(0));
  const fin={};
  const ensF=t=>{if(!fin[t])fin[t]={appear:0,kf:0,hf:0,finalist:0,p1:0,p2:0}};
  const pk=POULE_ORDER_16.filter(k=>data[k]);

  for(let s=0;s<N;s++){
    const st={};
    for(const id of pk){const o=simPoule(data[id],ha);st[id]=o.map(i=>data[id].teams[i]);for(let r=0;r<data[id].teams.length;r++)ss[id][o[r]][r]++}
    // Rank #1s and #2s across poules by current sim points (approximate by original pts)
    const nr1s=pk.map(k=>({team:st[k][0],poule:k,pts:data[k].pts[data[k].teams.indexOf(st[k][0])]||0}));
    const nr2s=pk.map(k=>({team:st[k][1],poule:k,pts:data[k].pts[data[k].teams.indexOf(st[k][1])]||0}));
    // Sort by random tiebreak (simulated ranking)
    nr1s.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:Math.random()-.5);
    nr2s.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:Math.random()-.5);
    // KF: Beste#1 vs 4e#2, 2e#1 vs 3e#2, 3e#1 vs 2e#2, 4e#1 vs Beste#2
    const kf=[[nr1s[0].team,nr2s[3].team],[nr1s[1].team,nr2s[2].team],[nr1s[2].team,nr2s[1].team],[nr1s[3].team,nr2s[0].team]];
    for(const[h,a]of kf){ensF(h);ensF(a);fin[h].appear++;fin[a].appear++;fin[h].kf++;fin[a].kf++}
    // KF results
    const kfW=kf.map(([h,a])=>simKO()==='home'?h:a);
    // HF: W(KF1) vs W(KF4), W(KF2) vs W(KF3)
    for(const t of kfW){fin[t].hf++}
    const hf1w=simKO()==='home'?kfW[0]:kfW[3],hf2w=simKO()==='home'?kfW[1]:kfW[2];
    const hf1l=hf1w===kfW[0]?kfW[3]:kfW[0],hf2l=hf2w===kfW[1]?kfW[2]:kfW[1];
    fin[hf1w].finalist++;fin[hf2w].finalist++;
    const fW=Math.random()<.5?hf1w:hf2w,fL=fW===hf1w?hf2w:hf1w;
    fin[fW].p1++;fin[fL].p2++
  }
  return{ss,fin}
}

// ════════════════════════════════════════════
// PARSERS
// ════════════════════════════════════════════
const pct=(c,N)=>Math.round(c/N*100);
const pc=(p,hi,mid)=>p>=hi?'prob-hi':p>=mid?'prob-mid':'prob-low';
const clean16=n=>n.replace(/ [MJ]O\d+-\d+/g,'').trim();
const clean14=n=>n.replace(/ [A-Z]?O?\d+-\d+/g,'').trim();

function parseO14(raw){
  const parsed=JSON.parse(raw);const comps={};
  for(const[key,val]of Object.entries(parsed)){
    const ld=key.replace(/_.*/,'');
    if(POULE_ORDER_14.includes(ld)&&val.teams){
      const comp=val.competition||'';const type=comp.includes('Jongens')?'JO14':'MO14';
      if(!comps[type])comps[type]={};
      comps[type][ld]={teams:val.teams,pts:val.pts,ds:val.ds,remaining:val.remaining,played_count:val.played_count||0,standings:val.standings||[],matches_played:val.matches_played||[],poule_id:val.poule_id,competition:val.competition||''};
      continue;
    }
    if(val.data&&val.data.data&&val.data.data.poule){
      const d=val.data.data,pn=(d.poule.name||'').replace('Poule ','');
      if(!POULE_ORDER_14.includes(pn))continue;
      const comp=val.competition||(d.poule.competition&&d.poule.competition.name)||'',cls=val.class_name||(d.poule.competition&&d.poule.competition.class_name)||'';
      if(!comp.includes('O14')||cls!=='Super')continue;
      const type=comp.includes('Jongens')?'JO14':'MO14';
      const st=d.poule.standings||[],ma=d.poule.matches||[],pl=ma.filter(m=>m.status==='final'),re=ma.filter(m=>m.status!=='final');
      if(!comps[type])comps[type]={};
      comps[type][pn]={teams:st.map(s=>clean14(s.team.name)),pts:st.map(s=>s.points),ds:st.map(s=>s.goals_for-s.goals_against),
        remaining:re.map(m=>[clean14(m.home.name),clean14(m.away.name),m.date||'']),played_count:pl.length,
        standings:st.map(s=>({rank:s.rank,team:clean14(s.team.name),team_id:s.team.id,points:s.points,wins:s.wins,draws:s.draws,losses:s.losses,gf:s.goals_for,ga:s.goals_against,gd:s.goals_for-s.goals_against})),
        matches_played:pl.map(m=>({round:m.round,home:clean14(m.home.name),away:clean14(m.away.name),score:`${m.score.home}-${m.score.away}`,date:m.date||''})),
        poule_id:parseInt(key),competition:`${comp} · ${cls}`};
    }
  }
  return comps;
}

function parseO16(raw){
  const parsed=JSON.parse(raw);
  // Handle both direct format and wrapped {comp_XX: {data: ...}} format
  let d=parsed;
  if(parsed.data&&parsed.data.poules)d=parsed;
  else{const k=Object.keys(parsed)[0];if(parsed[k]&&parsed[k].data&&parsed[k].data.data)d=parsed[k].data;else if(parsed[k]&&parsed[k].data&&parsed[k].data.poules)d=parsed[k].data;else return{}}
  if(!(d&&d.data&&d.data.poules)&&!(d&&d.poules))return{};
  const root=d.data||d;
  const name=root.name||'';
  const type=name.includes('Jongens')?'JO16':name.includes('Meisjes')?'MO16':'O16';
  const poules=root.poules||[];
  const result={};
  for(const p of poules){
    const cls=(p.competition&&p.competition.class_name)||'';
    if(cls!=='Landelijk')continue;
    const letter=(p.name||'').replace('Poule ','');
    if(!POULE_ORDER_16.includes(letter))continue;
    const st=p.standings||[],ma=p.matches||[];
    const pl=ma.filter(m=>m.status==='final'),re=ma.filter(m=>m.status!=='final');
    result[letter]={teams:st.map(s=>clean16(s.team.name)),pts:st.map(s=>s.points),ds:st.map(s=>s.goals_for-s.goals_against),
      remaining:re.map(m=>[clean16(m.home.name),clean16(m.away.name),m.date||'']),played_count:pl.length,
      standings:st.map(s=>({rank:s.rank,team:clean16(s.team.name),team_id:s.team.id,points:s.points,wins:s.wins,draws:s.draws,losses:s.losses,gf:s.goals_for,ga:s.goals_against,gd:s.goals_for-s.goals_against})),
      matches_played:pl.map(m=>({round:m.round,home:clean16(m.home.name),away:clean16(m.away.name),score:`${m.score.home}-${m.score.away}`,date:m.date||''})),
      competition:name};
  }
  return{[type]:result};
}

  }
  const slot2t={};for(const id of pk){slot2t[`${id} nr 1`]=data[id].teams[0];slot2t[`${id} nr 2`]=data[id].teams[1]}
  const MR=({m})=>{const hT=slot2t[m.home]||m.home,aT=slot2t[m.away]||m.away,hMy=hT===myTeam,aMy=aT===myTeam;

  const sA=(nkSchedule&&nkSchedule.schedA)||[],sB=(nkSchedule&&nkSchedule.schedB)||[],tA=(nkSchedule&&nkSchedule.timesA)||[],tB=(nkSchedule&&nkSchedule.timesB)||[],fins=(nkSchedule&&nkSchedule.finales)||[],pD=(nkSchedule&&nkSchedule.poulefaseDate)||'',fD=(nkSchedule&&nkSchedule.finaleDate)||'';

  return(<div>

function ImportScreen({onImport}){
  const[text,setText]=useState('');const[error,setError]=useState('');const[loaded,setLoaded]=useState([]);const fileRef=useRef(null);
  const mergedRef=useRef({});

  function mergeInto(raw,filename){
    try{
      var comps=mergedRef.current;
      var o14=parseO14(raw);for(var t in o14){if(!comps[t])comps[t]={};Object.assign(comps[t],o14[t])}
      var o16=parseO16(raw);for(var t in o16){if(!comps[t])comps[t]={};Object.assign(comps[t],o16[t])}
      mergedRef.current=comps;
      // Count what we have
      var summary=[];
      for(var type in comps){summary.push(type+': '+Object.keys(comps[type]).length+' poules')}
      setLoaded(function(prev){return prev.concat([{name:filename,status:'✅',detail:summary.join(', ')}])});
      setError('');
      return true;
    }catch(e){
      setLoaded(function(prev){return prev.concat([{name:filename,status:'❌',detail:e.message}])});
      return false;
    }
  }

  function handleFiles(e){
    var files=e.target.files;
    if(!files||!files.length)return;
    for(var i=0;i<files.length;i++){
      (function(file){
        var r=new FileReader();
        r.onload=function(ev){mergeInto(ev.target.result,file.name)};
        r.readAsText(file);
      })(files[i]);
    }
  }

  function handleDrop(e){
    e.preventDefault();
    var files=e.dataTransfer.files;
    if(!files||!files.length)return;
    for(var i=0;i<files.length;i++){
      (function(file){
        var r=new FileReader();
        r.onload=function(ev){mergeInto(ev.target.result,file.name)};
        r.readAsText(file);
      })(files[i]);
    }
  }

  function handlePaste(e){
    setTimeout(function(){
      var v=e.target.value;
      if(v.trim().startsWith('{')){
        mergeInto(v,'clipboard');
        setText(v);
      }
    },50);
  }

  function doStart(){
    var comps=mergedRef.current;
    if(Object.keys(comps).length===0){setError('Geen data geladen');return}
    onImport(comps);
  }

  function doImportText(){
    if(!text.trim())return;
    mergeInto(text,'textarea');
  }

  var totalComps=Object.keys(mergedRef.current).length;
  var totalPoules=0;
  for(var t in mergedRef.current){totalPoules+=Object.keys(mergedRef.current[t]).length}

  return(<div className="import-screen"><h2>🏑 NK Simulatie</h2>
    <p>Ondersteunt MO14, JO14, MO16, JO16.<br/>Upload meerdere bestanden — ze worden samengevoegd.</p>

    <div style={{border:'2px dashed #ccc',borderRadius:10,padding:20,background:'#fff',marginBottom:12,cursor:'pointer',textAlign:'center'}}
      onDrop={handleDrop} onDragOver={function(e){e.preventDefault()}}
      onClick={function(){fileRef.current.click()}}>
      <div style={{fontSize:24,marginBottom:6}}>📁</div>
      <div style={{fontSize:13,color:'#888'}}>Sleep bestanden hierheen of klik om te selecteren</div>
      <div style={{fontSize:11,color:'#bbb',marginTop:4}}>Meerdere bestanden tegelijk mogelijk</div>
    </div>
    <input type="file" accept=".json" multiple ref={fileRef} onChange={handleFiles} style={{display:'none'}}/>

    {loaded.length>0&&<div style={{textAlign:'left',marginBottom:12}}>
      {loaded.map(function(f,i){return(<div key={i} style={{fontSize:11,fontFamily:"'DM Mono',monospace",padding:'3px 0',color:f.status==='✅'?'#16a34a':'#dc2626'}}>
        {f.status} {f.name} — {f.detail}
      </div>)})}
      {totalComps>0&&<div style={{fontSize:12,fontWeight:600,marginTop:6,color:'#1a1a1a'}}>
        Totaal: {totalComps} competities · {totalPoules} poules
      </div>}
    </div>}

    <div style={{borderTop:'1px solid #eee',paddingTop:12,marginTop:8}}>
      <div style={{fontSize:11,color:'#999',marginBottom:6}}>Of plak JSON:</div>
      <textarea className="import-area" style={{minHeight:80}} value={text} onChange={function(e){setText(e.target.value)}} onPaste={handlePaste}
        placeholder="Plak JSON hier..."/>
      {text&&<button className="demo-btn" style={{marginTop:6}} onClick={doImportText}>+ Toevoegen aan data</button>}
    </div>

    {error&&<div className="import-error">{error}</div>}
    <br/>
    <button className="import-btn" onClick={doStart} disabled={totalComps===0}>
      {totalComps>0?'Start met '+totalPoules+' poules':'Laad eerst data'}
    </button>
  </div>);
}

    'Extensie v6 pusht data direct naar GitHub repo',
  ]},
  {version:'4.2',date:'19 mei 2026',changes:[
    'NK speelschema (O14) embedded in HTML — geen aparte bestanden meer nodig',
    'NK Speelschema en Finales werken nu ook bij lokaal testen en handmatige import',
    'Verwijderd: nk_mo14.json en nk_jo14.json server-bestanden niet meer nodig',
    'Pre-geparsed: 28KB raw → 2.5KB compact per schedule',
  ]},
  {version:'4.1.1',date:'19 mei 2026',changes:[
    'Fix: NK Speelschema en NK Finales worden nu ook bij handmatige import geladen',
    'NK schedule bestanden worden altijd van de server opgehaald (onafhankelijk van data-bron)',
  ]},
  {version:'4.1',date:'19 mei 2026',changes:[
    'Import: meerdere bestanden tegelijk uploaden (multi-select of drag & drop)',
    'Bestanden worden automatisch samengevoegd (MO14 + JO14 + MO16 + JO16 in één keer)',
    'Import-scherm toont per bestand status (✅/❌) en welke competities erin zitten',
    'Totaal-overzicht van geladen competities en poules voor je start',
    'Plak-optie is nu aanvullend — voegt toe aan al geladen data',
  ]},
  {version:'4.0',date:'19 mei 2026',changes:[
    'O16 support: Landelijke competitie met 4 poules + KF/HF/Finale simulatie',
    'O16 Monte Carlo: Kwartfinales seeding (Beste #1 vs 4e #2, etc.), HF, Finale',
    'O16 Overzicht: 4 poule-kaarten + NK structuur uitleg',
    'Competitie-tabs: MO14, JO14, MO16, JO16 — alles in één app',
    'Parser voor /competitions/national/ format (O16) + /poules/ format (O14)',
    'Voorkeursclub configureerbaar (MY_TEAMS array)',
  ]},
  {version:'3.1',date:'19 mei 2026',changes:['NK speelschema dynamisch uit JSON bestanden']},
  {version:'3.0',date:'19 mei 2026',changes:['Auto-load data van server','Import fallback']},
  {version:'2.1',date:'19 mei 2026',changes:['Compacte header']},
  {version:'2.0',date:'19 mei 2026',changes:['Multi-competitie MO14+JO14','Mijn team sectie']},
  {version:'1.0',date:'19 mei 2026',changes:['Eerste dynamische versie']},
];
function ChangelogTab(){return(<div style={{maxWidth:700}}><div className="section-label" style={{marginTop:0}}>Versiegeschiedenis</div>
  {CHANGELOG.map(e=>(<div key={e.version} className="card" style={{marginBottom:12}}><div className="card-header" style={{justifyContent:'space-between'}}><span>v{e.version}</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'#888',fontWeight:400}}>{e.date}</span></div>
    <div style={{padding:'10px 14px'}}>{e.changes.map((c,i)=>(<div key={i} style={{fontSize:12.5,color:'#444',padding:'3px 0',display:'flex',gap:8}}><span style={{color:'#16a34a',flexShrink:0}}>+</span><span>{c}</span></div>))}</div></div>))}</div>)}

// ════════════════════════════════════════════
// APP
// ════════════════════════════════════════════
const DEFAULT_CLUB='Victoria';
const STORAGE_KEY_CLUB='nk_focus_club';
function getSavedClub(){try{return localStorage.getItem(STORAGE_KEY_CLUB)||DEFAULT_CLUB}catch(e){return DEFAULT_CLUB}}
function saveClub(name){try{localStorage.setItem(STORAGE_KEY_CLUB,name)}catch(e){}}

function getAllClubs(comps){
  var clubs={};
  for(var t in comps){
    for(var p in comps[t]){
      var teams=comps[t][p].teams||[];
      for(var i=0;i<teams.length;i++){clubs[teams[i]]=true}
    }
  }
  return Object.keys(clubs).sort();
}
const DATA_URLS=['data/mo14.json','data/jo14.json','data/mo16.json','data/jo16.json'];
const COMP_LABELS={MO14:'MO14',JO14:'JO14',MO16:'MO16',JO16:'JO16'};
const COMP_LABELS_LONG={MO14:'Meisjes O14',JO14:'Jongens O14',MO16:'Meisjes O16',JO16:'Jongens O16'};
const COMP_ORDER=['MO14','JO14','MO16','JO16'];
const IS_O16=t=>t==='MO16'||t==='JO16';

function App(){
  const[comps,setComps]=useState(null);
  const[activeComp,setActiveComp]=useState(null);const[mainTab,setMainTab]=useState('overzicht');
  const[loading,setLoading]=useState(true);const[dataSource,setDataSource]=useState(null);
  const[showVersion,setShowVersion]=useState(false);
  const[focusClub,setFocusClub]=useState(getSavedClub);
  const[showClubPicker,setShowClubPicker]=useState(false);
  const[clubSearch,setClubSearch]=useState('');
  const[focusMode,setFocusMode]=useState(false);

  function fetchFromServer(){
    setLoading(true);
    var merged={};
    var promises=DATA_URLS.map(function(url){
      return fetch(url+'?t='+Date.now()).then(function(r){return r.ok?r.text():null}).then(function(raw){
        if(!raw)return;
        var parsed=parseO16(raw);if(Object.keys(parsed).length===0)parsed=parseO14(raw);
        for(var t in parsed){if(!merged[t])merged[t]={};Object.assign(merged[t],parsed[t])}
      }).catch(function(){});
    });
    Promise.all(promises).then(function(){
      if(Object.keys(merged).length>0){
        setComps(merged);
        var first=COMP_ORDER.find(function(k){return merged[k]});
        setActiveComp(function(prev){return first||(prev&&merged[prev]?prev:Object.keys(merged)[0])});
        setDataSource('server');
      }
      setLoading(false);
    });
  }

  useEffect(function(){fetchFromServer()},[]);

  const handleImport=function(c){
    setComps(c);
    var first=COMP_ORDER.find(function(k){return c[k]});
    setActiveComp(first||Object.keys(c)[0]);
    setDataSource('manual');
  };
  const handleReload=function(){fetchFromServer()};
  if(loading)return(<div className="import-screen"><h2>🏑 NK Simulatie</h2><p>Data laden...</p></div>);
  if(!comps)return<ImportScreen onImport={handleImport}/>;

  const types=COMP_ORDER.filter(k=>comps[k]);
  // In focus mode: only show competitions where focusClub plays
  const visibleTypes=focusMode&&focusClub?types.filter(function(t){
    var d=comps[t];for(var p in d){if(d[p].teams&&d[p].teams.indexOf(focusClub)>=0)return true}return false;
  }):types;
  // Auto-switch to visible comp if current is filtered out
  if(focusMode&&visibleTypes.length>0&&visibleTypes.indexOf(activeComp)<0){
    // Can't call setActiveComp during render, use effect
  }
  var effectiveComp=focusMode&&visibleTypes.indexOf(activeComp)<0&&visibleTypes.length>0?visibleTypes[0]:activeComp;
  const data=comps[effectiveComp]||{};
  // In focus mode: filter data to only the poule with focusClub
  var filteredData=data;
  if(focusMode&&focusClub){
    filteredData={};
    for(var pk in data){if(data[pk].teams&&data[pk].teams.indexOf(focusClub)>=0)filteredData[pk]=data[pk]}
  }
  const label=COMP_LABELS_LONG[effectiveComp]||effectiveComp;
  const myTeam=focusClub&&findMyTeam(comps,focusClub)?focusClub:null;
  const o16=IS_O16(effectiveComp);
  const pouleOrder=o16?POULE_ORDER_16:POULE_ORDER_14;

  const myInfo=(()=>{if(!myTeam||!comps[effectiveComp])return null;const d=comps[effectiveComp];
    for(const[pid,p]of Object.entries(d)){const idx=p.teams.indexOf(myTeam);
      if(idx>=0){const rank=idx+1,mpr=Math.floor(p.teams.length/2),rem=mpr>0?Math.round(p.remaining.length/mpr):0;
        let nk='';if(!o16){const sl=NK14_SLOTS[pid];if(rank===1&&sl)nk=sl[0]||'';else if(rank===2&&sl)nk=sl[1]||'';}
        return{pouleId:pid,rank,pts:p.pts[idx],ds:p.ds[idx],nk,rem}}}return null})();

  return(<>
    <div className="top-bar">
      <div className="top-row">
        <div className="top-team">
          <div className="top-team-icon" onClick={function(){if(focusClub)setFocusMode(!focusMode)}} style={{cursor:'pointer',border:focusMode?'2px solid #3b82f6':'2px solid transparent',borderRadius:'50%'}} title={focusMode?'Toon alles':'Toon alleen '+focusClub}>🏑</div>
          <div className="top-team-name" onClick={function(){setShowClubPicker(true);setClubSearch('')}} style={{cursor:'pointer'}} title="Kies focus club">{focusClub||'Kies club'}{focusMode&&<span style={{fontSize:10,color:'#3b82f6',marginLeft:4}}>focus</span>}</div>
        </div>
        <div className="top-end">
          <button className="reload-btn" onClick={handleReload} title="Herlaad data van server">↻</button>
          <button className="reload-btn" onClick={function(){setShowVersion(!showVersion)} } title="Versiegeschiedenis">v{VERSION}</button>
        </div>
      </div>
      <div className="top-comp-row">{visibleTypes.map(t=>(<button key={t} className={`top-comp-btn ${effectiveComp===t?'active':''}`}
        onClick={()=>{setActiveComp(t);setMainTab('overzicht')}}>{COMP_LABELS[t]||t}</button>))}</div>
    </div>
    {showVersion&&<><div className="version-overlay" onClick={function(){setShowVersion(false)}}></div><div className="version-popup">
      <div className="version-popup-header"><span>Versiegeschiedenis</span><button className="version-close" onClick={function(){setShowVersion(false)}}>✕</button></div>
      <div className="version-popup-body"><ChangelogTab/></div>
    </div></>}
    {showClubPicker&&<><div className="version-overlay" onClick={function(){setShowClubPicker(false)}}></div><div className="version-popup" style={{maxWidth:400}}>
      <div className="version-popup-header"><span>🏑 Kies focus club</span><button className="version-close" onClick={function(){setShowClubPicker(false)}}>✕</button></div>
      <div className="version-popup-body">
        <input className="club-search" placeholder="Zoek club..." value={clubSearch} onChange={function(e){setClubSearch(e.target.value)}} autoFocus/>
        <div className="club-list">
          {comps&&getAllClubs(comps).filter(function(c){return!clubSearch||c.toLowerCase().indexOf(clubSearch.toLowerCase())>=0}).map(function(club){
            var active=club===focusClub;
            return(<div key={club} className={'club-item'+(active?' club-active':'')} onClick={function(){setFocusClub(club);saveClub(club);setShowClubPicker(false);toast('🏑 '+club)}}>
              {active&&<span style={{color:'#3b82f6',marginRight:6}}>✓</span>}{club}
            </div>)
          })}
        </div>
      </div>
    </div></>}
    <div className="main-tabs">
      {[['overzicht','📋 Overzicht'],['schema','📅 Speelschema'],['sim','🎲 Simulaties']].map(([id,lbl])=>(
        <button key={id} className={`main-tab ${mainTab===id?'active':''}`} onClick={()=>setMainTab(id)}>{lbl}</button>))}
    </div>
    {mainTab==='overzicht'&&(o16?<O16OverzichtTab data={data} filteredData={focusMode?filteredData:null} myTeam={myTeam}/>:<O14OverzichtTab data={data} filteredData={focusMode?filteredData:null} myTeam={myTeam} nkSchedule={NK_SCHEDULES[effectiveComp]}/>)}
    {mainTab==='schema'&&<SchemaTab data={focusMode?filteredData:data} myTeam={myTeam} pouleOrder={pouleOrder}/>}
    {mainTab==='sim'&&(o16?<O16SimTab data={data} myTeam={myTeam} key={effectiveComp}/>:<O14SimTab data={data} myTeam={myTeam} key={effectiveComp}/>)}
    <footer>NK {label} · v{VERSION} · data {dataSource==='server'?'van server':'handmatig'}</footer>
  </>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
